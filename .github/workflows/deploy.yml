name: User Preferences Release

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TARGET_NS: legacy-services
      IMAGE_NAME: user-preference-api
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immutable image
        run: |
          IMAGE_URI="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "${GITHUB_ENV}"

      - name: Rewrite manifest image to current release
        run: |
          sed -i.bak \
            "s|image: .*|image: ${IMAGE_URI}|" \
            k8s/deployment.yaml
          rm k8s/deployment.yaml.bak

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Write kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p "${HOME}/.kube"
          printf "%s" "${KUBE_CONFIG}" > "${HOME}/.kube/config"

      - name: Apply patched manifests
        run: kubectl apply --namespace "${TARGET_NS}" -f k8s/

      - name: Wait for rollout
        run: kubectl rollout status deployment/user-preference-api --namespace "${TARGET_NS}"
